name: Test and lint React

on:
  pull_request:
    branches:
      - main
      - rc

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Disable ESLint problem matcher
        run: echo "::remove-matcher owner=eslint::"

      - name: Lint
        run: |
          npm ci --cache .npm --prefer-offline
          npm run lint:ci

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
      - name: Build library
        run: |
          npm ci --cache .npm --prefer-offline
          npm run build

  test-coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Install dependencies
        run: |
          npm ci --cache .npm --prefer-offline

      - name: Run coverage tests
        run: |
          npm run test:coverage

      - name: Upload results to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          working-directory: ./

  accessibility:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
      - name: Install dependencies
        run: npm ci --cache .npm --prefer-offline
      - name: Install Playwright (chromium)
        run: npx playwright install --with-deps chromium
      - name: Build Storybook (tedi stories only)
        run: npm run build:sb
        env:
          STORYBOOK_EXCLUDE_COMMUNITY: "true"
      - name: Run accessibility tests
        id: a11y
        # Detect-only: this step never gates. The report step below decides
        # pass/fail (block only violations in components this PR changed).
        run: |
          mkdir -p a11y-report
          set +e
          npm run test-storybook:ci 2>&1 | tee a11y-report/output.log
          echo "test-storybook exit code: ${PIPESTATUS[0]}"
        env:
          JEST_JUNIT_OUTPUT_DIR: a11y-report
          JEST_JUNIT_OUTPUT_NAME: junit.xml
      - name: Determine changed files
        if: always()
        run: |
          mkdir -p a11y-report
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          if [ -n "$base" ] && [ -n "$head" ] && git diff --name-only "$base...$head" > a11y-report/changed-files.txt; then
            echo "Changed files:"; cat a11y-report/changed-files.txt
          else
            echo "Could not determine changed files; all violations will block."
            rm -f a11y-report/changed-files.txt
          fi
      - name: Build accessibility report and gate
        if: always()
        # Exits non-zero (fails the job) only if a changed component has a
        # violation, or if the JUnit is missing (fail-closed on infra errors).
        run: node .github/scripts/a11y-report.mjs a11y-report/junit.xml a11y-report/output.log a11y-report/summary.md a11y-report/changed-files.txt dist/storybook-static/index.json
        env:
          STORYBOOK_BASE_URL: https://storybook.tedi.ee/react/${{ github.head_ref || github.ref_name }}
      - name: Comment a11y summary on PR
        if: always() && github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- a11y-report -->';
            let body = marker + '\n';
            try {
              body += fs.readFileSync('a11y-report/summary.md', 'utf8');
            } catch {
              body += '## ♿ Accessibility\n\nNo report was produced (the run may have failed before testing).';
            }
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number });
            const existing = comments.find((c) => c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
      - name: Upload a11y report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: a11y-report
          path: a11y-report/
          retention-days: 7

  chromatic:
    runs-on: ubuntu-latest
    if: |
      (
        github.event_name == 'pull_request' &&
        github.event.pull_request.head.repo.full_name == github.repository &&
        github.event.pull_request.draft == false &&
        github.actor != 'dependabot[bot]'
      ) || (
        github.event_name == 'push' &&
        github.ref == 'refs/heads/rc'
      )
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Install dependencies
        run: |
          npm ci --cache .npm --prefer-offline

      - name: Publish to Chromatic
        run: |
          CHROMATIC_PROJECT_TOKEN=${{ secrets.CHROMATIC_TOKEN }} npm run chromatic
